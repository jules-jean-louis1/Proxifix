services:
  traefik:
    image: traefik:v2.5
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - symfony

  database:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    environment:
      POSTGRES_DB: ${DB_DEV_NAME}
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD}
      POSTGRES_USER: ${DB_DEV_USER}
    networks:
      - symfony
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      - "${DB_DEV_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_DEV_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  database_test:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    environment:
      POSTGRES_DB: ${DB_TEST_NAME}
      POSTGRES_PASSWORD: ${DB_TEST_PASSWORD}
      POSTGRES_USER: ${DB_TEST_USER}
    networks:
      - symfony
    volumes:
      - database_test_data:/var/lib/postgresql/data:rw
    ports:
      - "${DB_TEST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_TEST_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: ./php
    volumes:
      - ../backend:/var/www/symfony
    networks:
      - symfony
    environment:
      # Symfony Configuration
      APP_ENV: ${APP_ENV}
      KERNEL_CLASS: ${KERNEL_CLASS}
      APP_SECRET: ${APP_SECRET}
      SYMFONY_DEPRECATIONS_HELPER: ${SYMFONY_DEPRECATIONS_HELPER}
      PANTHER_APP_ENV: ${PANTHER_APP_ENV}
      PANTHER_ERROR_SCREENSHOT_DIR: ${PANTHER_ERROR_SCREENSHOT_DIR}
      
      # Database URLs
      DATABASE_URL: "postgresql://${DB_DEV_USER}:${DB_DEV_PASSWORD}@${DB_DEV_HOST}:5432/${DB_DEV_NAME}?serverVersion=${POSTGRES_VERSION}&charset=utf8"
      DATABASE_TEST_URL: "postgresql://${DB_TEST_USER}:${DB_TEST_PASSWORD}@${DB_TEST_HOST}:5432/${DB_TEST_NAME}?serverVersion=${POSTGRES_VERSION}&charset=utf8"
      
      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      
    depends_on:
      database:
        condition: service_healthy
      database_test:
        condition: service_healthy

  nginx:
    build: ./nginx
    volumes:
      - ../backend:/var/www/symfony
    networks:
      - symfony
    ports:
      - "${BACKEND_API_PORT}:80"
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=Host(`localhost`) || HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.nginx.entrypoints=web"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"

networks:
  symfony:

volumes:
  database_data:
  database_test_data:
