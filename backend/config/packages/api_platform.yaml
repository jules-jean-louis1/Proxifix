api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        json: ['application/json']
    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header
    enable_docs: true
    docs_formats:
        json: ['application/json']