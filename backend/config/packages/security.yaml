security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_CUSTOMER: ['ROLE_CUSTOMER']
        ROLE_TECHNICIAN: ['ROLE_TECHNICIAN']
        ROLE_ADMIN: ['ROLE_ADMIN', 'ROLE_TECHNICIAN']
        ROLE_SUPER_ADMIN: ['ROLE_SUPER_ADMIN', 'ROLE_ADMIN', 'ROLE_TECHNICIAN']

    providers:
        user:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        auth:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider: user

        api:
            pattern: ^/api
            stateless: true
            lazy: true
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: jwt_refresh

    access_control:
        # Routes publiques (pas d'authentification requise)
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS } # Allows accessing the Swagger UI
        - { path: ^/api/docs, roles: PUBLIC_ACCESS } # Allows accessing the Swagger UI docs
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/customer/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/admin/register, roles: PUBLIC_ACCESS }
        
        # Routes spécifiques avec des rôles particuliers (plus spécifiques en premier)
        - { path: ^/api/admin/interventions, roles: ROLE_TECHNICIAN }
        - { path: ^/api/admin/appointment, roles: ROLE_TECHNICIAN }
        - { path: ^/api/task, roles: ROLE_ADMIN }
        - { path: ^/api/task/intervention, roles: ROLE_ADMIN }
        - { path: ^/api/user, roles: ROLE_TECHNICIAN }
        - { path: ^/api/customer/appointment, roles: IS_AUTHENTICATED_FULLY }
        
        # Routes générales nécessitant une authentification
        - { path: ^/api/customer, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/equipment, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/intervention, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/operating-system, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/company, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/appointment, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/brand, roles: IS_AUTHENTICATED_FULLY }

when@test:
    doctrine:
        dbal:
            dbname_suffix: ''
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
