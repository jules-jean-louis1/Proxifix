security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_CUSTOMER: ['ROLE_CUSTOMER']
        ROLE_TECHNICIAN: ['ROLE_TECHNICIAN']
        ROLE_ADMIN: ['ROLE_ADMIN', 'ROLE_TECHNICIAN']

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        auth:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider: app_user_provider

        api:
            pattern: ^/api
            stateless: true
            lazy: true
            entry_point: jwt
            jwt:
                provider: app_user_provider
            refresh_jwt:
                provider: app_user_provider
                check_path: /api/auth/refresh

    access_control:
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS } # Allows accessing the Swagger UI
        - { path: ^/api/docs, roles: PUBLIC_ACCESS } # Allows accessing the Swagger UI docs
        - { path: ^/api/auth/customer/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/customer/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/admin/register, roles: PUBLIC_ACCESS }
        # TODO: Only authenticated admin can create new admin and technician accounts
        #- { path: ^/api/register, roles: ROLE_ADMIN }
        - { path: ^/api/customer, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/customer, roles: ROLE_TECHNICIAN }
        - { path: ^/api/brands, roles: ROLE_TECHNICIAN }
        - { path: ^/api/equipment, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/intervention, roles: ROLE_TECHNICIAN }
        - { path: ^/api/operating_system, roles: ROLE_TECHNICIAN }
        - { path: ^/api/company, roles: ROLE_ADMIN }
        - { path: ^/api/task, roles: ROLE_ADMIN }
        - { path: ^/api/task/intervention, roles: ROLE_ADMIN }
        - { path: ^/api/appointment/free-slots, roles: IS_AUTHENTICATED_FULLY}
        - { path: ^/api/appointment, roles : IS_AUTHENTICATED_FULLY}
        - { path: ^/api/customer/appointment, roles: IS_AUTHENTICATED_FULLY}
        - { path: ^/api/admin/appointment, roles: ROLE_TECHNICIAN}

when@test:
    doctrine:
        dbal:
            dbname_suffix: ''
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10