name: Test

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  test:
    name:  "PHP 8.3 / Postgres 15"
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
          POSTGRES_DB: proxifix_dev_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Install PHP with extensions"
        uses: shivammathur/setup-php@v2
        with:
          coverage: "none"
          extensions: "intl, mbstring, pdo_pgsql, zip"
          php-version: "8.3"
          tools: composer:v2

      - name: "Install dependencies"
        run: composer install --ansi --no-interaction --no-progress --no-scripts

      - name: "Generate JWT keys"
        run: |
          mkdir -p config/jwt
          openssl genpkey -out config/jwt/private.pem -algorithm rsa -aes256 -pass pass:proxifix_jwt_passphrase
          openssl pkey -in config/jwt/private.pem -passin pass:proxifix_jwt_passphrase -out config/jwt/public.pem -pubout

      - name: "Prepare test database"
        run: |
          mkdir -p var
          cp .env.test.ci .env.test.local
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
          php bin/console doctrine:fixtures:load --env=test --no-interaction

      - name: "Run tests"
        run: vendor/bin/phpunit
